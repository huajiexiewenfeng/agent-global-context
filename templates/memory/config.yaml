memory_root: "~/.agent-global-context"

auto_capture:
  enabled: true
  categories:
    preferences: true
    corrections: true
    identity: true
    project_decisions: true
  retention_days: 14
  recall_inbox: false
  min_priority_to_capture: P3
  session_start_notice: true

recall_policy:
  P0: always_summary
  P1: task_relevant
  P2: code_task
  P3: project_relevant
  P4: continuation_only

recall_limits:
  max_files_default: 4
  max_session_files: 2
  prefer_summary_sections: true
  p0_default: summary_only
  p4_ttl_days: 14

project_resolution:
  order:
    - explicit_project_binding
    - index_project_map
    - git_remote_slug
    - directory_name_slug
  require_confirmation_for_new_project: true

write_policy:
  explicit_remember:
    normal: direct_commit
    sensitive: confirm
  auto_capture:
    P0: pending_review
    P1: staging_only
    P2: staging_only
    P3: staging_only
    P4: session_only

sensitive_memory:
  require_confirmation: true
  never_store:
    - secrets
    - tokens
    - passwords
    - private_keys
    - recovery_codes

review:
  session_start_notice: true
  prompt_when_pending_count_gte: 5
  prompt_when_oldest_pending_days_gte: 7
  expire_pending_candidates: true
  max_candidates_per_review: 10
  require_confirmation:
    inferred: true
    tentative: true
    sensitive: true
